name: Whisperlocal
options:
  bundleIdPrefix: com.whisperlocal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  Whisperlocal:
    type: application
    platform: iOS
    sources:
      - path: Whisperlocal
    resources:
      - path: Whisperlocal/Resources
    info:
      path: Whisperlocal/Info.plist
      properties:
        CFBundleDisplayName: Whisperlocal
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Whisperlocal needs the microphone to record audio that you choose to transcribe. Audio never leaves your device."
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Whisperlocal/Whisperlocal.entitlements
      properties:
        com.apple.security.network.client: false
        com.apple.security.network.server: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whisperlocal.app
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Whisperlocal/Whisperlocal.entitlements

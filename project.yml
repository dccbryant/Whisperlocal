name: Parley
options:
  bundleIdPrefix: com.davidbryant
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "2A29M932WB"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    branch: main

targets:
  Parley:
    type: application
    platform: iOS
    sources:
      - path: Parley
    resources:
      - path: Parley/Resources
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: WhisperKit
        product: SpeakerKit
    info:
      path: Parley/Info.plist
      properties:
        CFBundleDisplayName: Parley
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: "Parley needs the microphone to record audio that you choose to transcribe. Audio never leaves your device."
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: Parley/Parley.entitlements
      properties: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.davidbryant.parley
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Parley/Parley.entitlements
